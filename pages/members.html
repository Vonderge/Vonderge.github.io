  <!-- 在CSS加载前立即应用深色模式，防止闪现 -->
  <script>
    (function() {
      var key = 'Fluid_Color_Scheme';
      var saved = null;
      try {
        saved = localStorage.getItem(key);
      } catch(e) {}
      var scheme = saved || 'dark';
      if (scheme === 'dark') {
        document.documentElement.setAttribute('data-user-color-scheme', 'dark');
      }
      
      // 初始化背景 CSS 变量 - 根据时间模式控制按钮设置
      var timeModeKey = 'Fluid_Time_Mode';
      var timeMode = null;
      try {
        timeMode = localStorage.getItem(timeModeKey);
      } catch(e) {}
      
      var dayBg = "url('/bg/mo.png')";
      var nightBg = "url('/bg/dn2.png')";
      
      // 根据时间模式按钮设置背景：morning 早上背景，evening 晚上背景
      if (timeMode === 'morning') {
        document.documentElement.style.setProperty('--day-bg', dayBg);
      } else if (timeMode === 'evening') {
        document.documentElement.style.setProperty('--day-bg', nightBg);
      } else {
        // 如果没有保存的设置，根据当前时间决定
        var hour = new Date().getHours();
        if (hour >= 6 && hour < 18) {
          document.documentElement.style.setProperty('--day-bg', dayBg);
        } else {
          document.documentElement.style.setProperty('--day-bg', nightBg);
        }
      }
      document.documentElement.style.setProperty('--night-bg', nightBg);
      
      // 应用当前主题的背景
      if (scheme === 'dark') {
        document.documentElement.style.setProperty('--day-bg', nightBg);
      }
    })();
  </script>
